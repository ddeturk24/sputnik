<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPUTNIK</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css?v=6">
</head>
<body>
  <div class="header">
    <h1 id="sputnik-title" style="cursor:pointer">Sputnik</h1>
    <div class="header-links">
      <!-- settings link hidden -->
    </div>
  </div>
  <div id="news-ticker">
    <div class="ticker-track" id="ticker-track"></div>
  </div>
  <div id="last-refresh" style="text-align:center;color:#555;font-size:0.7em;padding-bottom:4px;">Last refresh: —</div>

  <div class="grid">
    <!-- Calendar -->
    <div class="card">
      <div class="card-header">
        <span><a href="https://gmail.com" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">Calendar</a></span>
        <button id="cal-view-btn" class="btn btn-sm" onclick="toggleCalendarView()">30d</button>
      </div>
      <div class="card-body" id="calendar-widget">
        <div class="loading">Loading calendar...</div>
      </div>
    </div>

    <!-- Weather -->
    <div class="card">
      <div class="card-header"><a href="https://radar.weather.gov" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">Omaha Weather</a></div>
      <div class="card-body" id="weather-widget">
        <div class="loading">Loading weather...</div>
      </div>
    </div>

    <!-- To-Do List -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-header">To-Do List</div>
      <div class="card-body" id="todo-widget">
        <div class="list-input">
          <input type="text" id="todo-input" placeholder="Add a task...">
          <select id="todo-category">
            <option value="Dustin">Dustin</option>
            <option value="Darwin">Darwin</option>
            <option value="Levi">Levi</option>
            <option value="House">House</option>
          </select>
          <button class="btn" onclick="addTodo()">Add</button>
        </div>
        <div class="todo-columns" id="todo-columns">
          <div class="todo-column"><div class="todo-column-header">Dustin <button class="btn btn-sm" onclick="resetDone('Dustin')" title="Reset done items">&#x21BA;</button></div><div class="todo-column-body" id="todo-col-Dustin"></div></div>
          <div class="todo-column"><div class="todo-column-header">Darwin <button class="btn btn-sm" onclick="resetDone('Darwin')" title="Reset done items">&#x21BA;</button></div><div class="todo-column-body" id="todo-col-Darwin"></div></div>
          <div class="todo-column"><div class="todo-column-header">Levi <button class="btn btn-sm" onclick="resetDone('Levi')" title="Reset done items">&#x21BA;</button></div><div class="todo-column-body" id="todo-col-Levi"></div></div>
          <div class="todo-column"><div class="todo-column-header">House <button class="btn btn-sm" onclick="resetDone('House')" title="Reset done items">&#x21BA;</button></div><div class="todo-column-body" id="todo-col-House"></div></div>
        </div>
      </div>
    </div>

    <!-- Grocery List -->
    <div class="card">
      <div class="card-header">Grocery List</div>
      <div class="card-body" id="grocery-widget">
        <div class="list-input">
          <input type="text" id="grocery-input" placeholder="Add an item...">
          <button class="btn" onclick="addGrocery()">Add</button>
        </div>
        <div id="grocery-list"></div>
      </div>
    </div>

    <!-- System Status -->
    <div class="card">
      <div class="card-header">
        <span><a href="https://polaris.lightspeedup.com/" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">System Status</a></span>
        <button class="btn btn-sm" onclick="loadStatus(true)">Refresh</button>
      </div>
      <div class="card-body" id="status-widget">
        <div class="loading">Checking services...</div>
      </div>
    </div>

    <!-- News -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-header"><a href="https://frontpage.ink" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">Current Events</a></div>
      <div class="card-body" id="frontpage-widget">
        <div class="loading">Loading headlines...</div>
      </div>
    </div>

    <!-- Steam Wishlist -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-header"><a href="https://store.steampowered.com/wishlist/id/detox24/?sort=discount" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">Steam Wishlist</a></div>
      <div class="card-body" id="steam-wishlist-widget">
        <div class="loading">Loading wishlist...</div>
      </div>
    </div>

    <!-- SPUTNIK Ideas -->
    <div class="card" style="grid-column: 1 / -1;">
      <div class="card-header"><a href="https://github.com/ddeturk24" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">SPUTNIK Improvement Ideas</a></div>
      <div class="card-body" id="ideas-widget">
        <div class="list-input">
          <input type="text" id="ideas-input" placeholder="Add an improvement idea...">
          <button class="btn" onclick="addIdea()">Add</button>
        </div>
        <div id="ideas-list"></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js?v=5"></script>
  <script>
  (function() {
    var _ec = 0;
    var _et = document.getElementById('sputnik-title');
    if (_et) _et.addEventListener('click', function() {
      _ec++;
      if (_ec >= 5) {
        _ec = 0;
        var _eu = atob('aHR0cHM6Ly9saWdodHNwZWVkdXAuY29tL2VjaG8venFmdzYzQk5RVy1MNjFpa2t5RUJKcmNzenphQ2ZyMVdOUUxWdXBwcDAyUkpOMGF2aFY1bkVSMlRTTENmZnh4RS8=');
        window.open(_eu, '_blank');
      }
    });
  })();
  </script>
</body>
</html>
